name: smoke-tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-smoke.txt
      - name: Run sequence summary
        run: python scripts/sequence_summary.py
      - name: Run alignments
        run: python scripts/run_alignments.py --gap-open 10 --gap-extend 0.5
      - name: Prepare BLAST artifacts (offline)
        run: python scripts/run_blastp.py --offline
      - name: Generate figures
        run: |
          python scripts/make_figures.py
          python scripts/make_dotplots.py
          python scripts/make_alignment_figure.py
          python scripts/make_structure_figure.py
          python scripts/make_blast_figure.py
      - name: Structural contacts
        run: python scripts/analyze_structure.py --radius 5.0
